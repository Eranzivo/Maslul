<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>לוח שיבוצים — Maslul</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --accent: #6366F1;
    --accent-hover: #4F46E5;
    --accent-fill: #EEF2FF;
    --accent-border: #C7D2FE;
    --page: #F7F7F8;
    --surface: #FFFFFF;
    --border: #E4E4E7;
    --border-soft: #F0F0F2;
    --text: #111827;
    --text-2: #374151;
    --muted: #6B7280;
    --faint: #9CA3AF;
    --green: #10B981;
    --amber: #F59E0B;
    --red: #EF4444;
    --radius-btn: 6px;
    --radius-card: 10px;
    --radius-panel: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Heebo', sans-serif;
    background: var(--page);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow: hidden;
  }
  button { font-family: inherit; }

  .app { display: flex; flex-direction: column; height: 100vh; }

  /* ── Top bar ─────────────────────────────── */
  .topbar {
    height: 60px; flex: 0 0 60px;
    display: grid; grid-template-columns: 230px 1fr 230px; align-items: center;
    padding: 0 22px 0 24px; border-bottom: 1px solid var(--border); background: var(--surface);
    z-index: 20;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-mark { width: 30px; height: 30px; border-radius: 9px; background: var(--accent); position: relative; flex: 0 0 30px; }
  .brand-mark::after { content: ""; position: absolute; inset: 9.5px; border-radius: 50%; border: 2.5px solid #fff; border-bottom-color: transparent; transform: rotate(45deg); }
  .brand-name { font-size: 19px; font-weight: 800; letter-spacing: -0.01em; }

  .searchbar {
    justify-self: center; width: 100%; max-width: 480px;
    height: 38px; display: flex; align-items: center; gap: 9px;
    background: var(--page); border: 1px solid var(--border); border-radius: 9px;
    padding: 0 12px; color: var(--faint); cursor: text; transition: border-color .15s, background .15s;
  }
  .searchbar:hover { border-color: #d4d4d8; }
  .searchbar svg { width: 16px; height: 16px; }
  .searchbar input { flex: 1 1 auto; border: none; background: none; outline: none; font-family: inherit; font-size: 13.5px; color: var(--text); }
  .searchbar input::placeholder { color: var(--faint); }
  .searchbar .kbd { font-size: 11px; font-weight: 600; color: var(--faint); background: var(--surface); border: 1px solid var(--border); border-radius: 5px; padding: 2px 6px; }

  .topbar-actions { justify-self: end; display: flex; align-items: center; gap: 10px; }
  .icon-btn {
    width: 36px; height: 36px; border-radius: 9px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text-2); cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: border-color .15s, background .15s, color .15s; position: relative;
  }
  .icon-btn:hover { border-color: var(--accent-border); background: var(--accent-fill); color: var(--accent-hover); }
  .icon-btn svg { width: 18px; height: 18px; }
  .icon-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .icon-btn.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  .icon-btn .badge-dot { position: absolute; top: 8px; left: 9px; width: 7px; height: 7px; border-radius: 50%; background: var(--red); border: 1.5px solid var(--surface); }
  .me { width: 34px; height: 34px; border-radius: 50%; background: var(--accent-fill); color: var(--accent-hover); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; cursor: pointer; }

  /* ── Body row ────────────────────────────── */
  .body { flex: 1 1 auto; display: flex; min-height: 0; }

  /* Sidebar (right in RTL) */
  .sidebar {
    width: 230px; flex: 0 0 230px; background: var(--surface);
    border-left: 1px solid var(--border); padding: 16px 14px;
    display: flex; flex-direction: column; gap: 2px;
  }
  .nav-section { font-size: 11px; font-weight: 700; color: var(--faint); padding: 8px 12px 4px; letter-spacing: .03em; }
  .nav-item {
    display: flex; align-items: center; gap: 11px;
    height: 40px; padding: 0 12px; border-radius: 8px;
    font-size: 14px; font-weight: 500; color: var(--text-2);
    text-decoration: none; cursor: pointer; transition: background .15s, color .15s;
  }
  .nav-item svg { width: 18px; height: 18px; color: var(--faint); transition: color .15s; }
  .nav-item:hover { background: var(--page); color: var(--text); }
  .nav-item.active { background: var(--accent-fill); color: var(--accent-hover); font-weight: 600; }
  .nav-item.active svg { color: var(--accent); }
  .sidebar-spacer { flex: 1 1 auto; }
  .nav-help { display: flex; align-items: center; gap: 10px; padding: 12px; border-radius: 10px; background: var(--page); border: 1px solid var(--border); }
  .nav-help .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex: 0 0 8px; }
  .nav-help .t { font-size: 12px; }
  .nav-help .t b { display: block; font-size: 12.5px; font-weight: 700; color: var(--text); }
  .nav-help .t span { color: var(--muted); font-size: 11.5px; }

  /* ── Main ────────────────────────────────── */
  .main { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; padding: 22px 26px 0; }

  .head { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 16px; }
  .head .title-wrap { display: flex; flex-direction: column; gap: 4px; }
  .head .title-row { display: flex; align-items: center; gap: 8px; }
  .head h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; }
  .head .chev { color: var(--faint); display: flex; }
  .head .chev svg { width: 18px; height: 18px; }
  .head .sub { display: flex; align-items: center; gap: 10px; font-size: 13.5px; color: var(--muted); }
  .head .sub .range { font-weight: 500; }
  .head .sub .stat { display: flex; align-items: center; gap: 6px; }
  .head .sub .stat .d { width: 6px; height: 6px; border-radius: 50%; }
  .head .sub .dotsep { color: var(--border); }

  .controls { display: flex; align-items: center; gap: 10px; }
  .seg { display: flex; background: var(--page); border: 1px solid var(--border); border-radius: 8px; padding: 3px; gap: 2px; }
  .seg button {
    height: 30px; padding: 0 16px; border: none; background: none; border-radius: 6px;
    font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; transition: background .15s, color .15s, box-shadow .15s;
  }
  .seg button.active { background: var(--surface); color: var(--accent-hover); box-shadow: 0 1px 2px rgba(17,24,39,.08); }
  .navgroup { display: flex; align-items: center; gap: 6px; }
  .navgroup .today { height: 36px; padding: 0 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); font-size: 13px; font-weight: 600; color: var(--text-2); cursor: pointer; transition: border-color .15s, background .15s, color .15s; }
  .navgroup .today:hover { border-color: var(--accent-border); background: var(--accent-fill); color: var(--accent-hover); }
  .navgroup .arrow { width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text-2); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: border-color .15s, background .15s, color .15s; }
  .navgroup .arrow:hover { border-color: var(--accent-border); background: var(--accent-fill); color: var(--accent-hover); }
  .navgroup .arrow svg { width: 16px; height: 16px; }

  /* Filter pills */
  .filters { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .pill {
    display: inline-flex; align-items: center; gap: 8px;
    height: 34px; padding: 0 14px; border-radius: 999px;
    border: 1px solid var(--border); background: var(--surface);
    font-size: 13px; font-weight: 600; color: var(--text-2); cursor: pointer;
    transition: border-color .15s, background .15s, color .15s, opacity .15s; user-select: none;
  }
  .pill .av { width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; color: #fff; }
  .pill .swatch { width: 9px; height: 9px; border-radius: 50%; }
  .pill.all .swatch { background: linear-gradient(135deg, #6366F1 0%, #7C3AED 50%, #0D9488 100%); }
  .pill.active { border-color: var(--accent-border); background: var(--accent-fill); color: var(--text); }
  .pill.dim { opacity: .4; }
  .pill:hover { border-color: var(--accent-border); }

  /* Day-view tabs */
  .daytabs { display: none; align-items: center; gap: 6px; margin-bottom: 16px; }
  .daytabs.show { display: flex; }
  .daytab { display: flex; flex-direction: column; align-items: center; gap: 1px; min-width: 64px; padding: 7px 0; border: 1px solid var(--border); background: var(--surface); border-radius: 9px; cursor: pointer; transition: border-color .15s, background .15s; }
  .daytab .dn { font-size: 13px; font-weight: 700; color: var(--text-2); }
  .daytab .dd { font-size: 11px; color: var(--faint); }
  .daytab:hover { border-color: var(--accent-border); }
  .daytab.active { border-color: var(--accent); background: var(--accent-fill); }
  .daytab.active .dn { color: var(--accent-hover); }
  .daytab.active .dd { color: var(--accent-hover); }

  /* ── Board (scroll container) ────────────── */
  .board {
    flex: 1 1 auto; min-height: 0; overflow: auto;
    border: 1px solid var(--border); border-radius: var(--radius-panel);
    background: var(--surface); margin-bottom: 22px;
  }
  .board::-webkit-scrollbar { width: 10px; height: 10px; }
  .board::-webkit-scrollbar-thumb { background: #e4e4e7; border-radius: 6px; border: 2px solid var(--surface); }
  .board::-webkit-scrollbar-thumb:hover { background: #d4d4d8; }

  /* ── WEEK MATRIX ─────────────────────────── */
  .matrix { display: grid; grid-template-columns: 190px repeat(5, minmax(178px, 1fr)); min-width: 1010px; }

  .corner {
    position: sticky; top: 0; right: 0; z-index: 5;
    background: var(--surface); border-bottom: 1px solid var(--border); border-left: 1px solid var(--border);
  }
  .dhead {
    position: sticky; top: 0; z-index: 3;
    background: var(--surface); border-bottom: 1px solid var(--border); border-left: 1px solid var(--border-soft);
    padding: 14px 16px; text-align: center;
  }
  .dhead:last-child { border-left: none; }
  .dhead .dn { font-size: 14px; font-weight: 700; }
  .dhead .dd { font-size: 12px; color: var(--faint); margin-top: 2px; }
  .dhead.today { background: linear-gradient(180deg, var(--accent-fill), var(--surface)); }
  .dhead.today .dn { color: var(--accent-hover); }
  .dhead.today .dd { color: var(--accent); }
  .dhead.today .pin { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--accent); margin-bottom: 4px; }

  .tlabel {
    position: sticky; right: 0; z-index: 2;
    background: var(--surface); border-left: 1px solid var(--border); border-bottom: 1px solid var(--border-soft);
    padding: 16px 14px 16px 12px; display: flex; align-items: center; gap: 11px;
  }
  .tlabel .bar { width: 4px; align-self: stretch; border-radius: 4px; background: var(--tcolor); flex: 0 0 4px; }
  .tlabel .av { width: 34px; height: 34px; border-radius: 9px; flex: 0 0 34px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: #fff; background: var(--tcolor); }
  .tlabel .who { min-width: 0; }
  .tlabel .who .nm { font-size: 14px; font-weight: 700; white-space: nowrap; }
  .tlabel .who .meta { display: flex; align-items: center; gap: 6px; margin-top: 2px; font-size: 11.5px; color: var(--muted); }
  .tlabel .who .meta .av-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }

  .cell { border-left: 1px solid var(--border-soft); border-bottom: 1px solid var(--border-soft); padding: 12px; display: flex; flex-direction: column; gap: 10px; }
  .cell:nth-child(6n) { border-left: none; }
  .cell.today-col { background: #fafaff; }
  .cell.empty { align-items: center; justify-content: center; }
  .cell.empty .free { font-size: 12px; color: #cbd2dd; font-weight: 500; display: flex; align-items: center; gap: 6px; }
  .cell.empty .free .ln { width: 16px; height: 1px; background: #e4e4e7; }

  /* Window block */
  .wblock {
    background: var(--blockfill);
    border: 1px solid var(--blockborder);
    border-radius: var(--radius-card);
    overflow: hidden; cursor: pointer;
    transition: transform .12s ease, box-shadow .15s ease, border-color .15s ease;
  }
  .wblock:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(17,24,39,.08); border-color: var(--tcolor); }
  .wblock-head { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-bottom: 1px solid var(--blockborder); }
  .wblock-head .win { font-size: 12.5px; font-weight: 700; color: var(--tcolor); font-feature-settings: "tnum"; direction: ltr; }
  .wblock-head .cnt { margin-right: auto; min-width: 20px; height: 20px; padding: 0 6px; border-radius: 6px; background: var(--surface); border: 1px solid var(--blockborder); display: inline-flex; align-items: center; justify-content: center; font-size: 11.5px; font-weight: 700; color: var(--text-2); }
  .wblock-rows { display: flex; flex-direction: column; padding: 4px 0; }
  .jrow { display: flex; align-items: center; gap: 8px; padding: 6px 10px; }
  .jrow .st { width: 7px; height: 7px; border-radius: 50%; flex: 0 0 7px; }
  .jrow .st.pending { background: var(--amber); }
  .jrow .st.assigned { background: var(--accent); }
  .jrow .st.done { background: var(--green); }
  .jrow .nm { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .jrow .ct { margin-right: auto; font-size: 11.5px; color: var(--faint); white-space: nowrap; }
  .jrow.done .nm { color: var(--muted); }

  /* ── DAY TIMELINE ────────────────────────── */
  .dayview { display: none; min-width: 1010px; }
  .dayview.show { display: block; }
  .tl-head { position: sticky; top: 0; z-index: 3; display: grid; grid-template-columns: 190px 1fr; background: var(--surface); border-bottom: 1px solid var(--border); }
  .tl-head .corner2 { border-left: 1px solid var(--border); }
  .tl-axis { position: relative; height: 46px; }
  .tl-tick { position: absolute; top: 0; bottom: 0; border-right: 1px solid var(--border-soft); }
  .tl-tick .lbl { position: absolute; top: 14px; right: 8px; font-size: 11px; font-weight: 600; color: var(--faint); font-feature-settings: "tnum"; direction: ltr; }

  .tl-row { display: grid; grid-template-columns: 190px 1fr; border-bottom: 1px solid var(--border-soft); }
  .tl-row:last-child { border-bottom: none; }
  .tl-row .tlabel2 { position: sticky; right: 0; z-index: 2; background: var(--surface); border-left: 1px solid var(--border); padding: 14px 14px 14px 12px; display: flex; align-items: center; gap: 11px; }
  .tl-row .tlabel2 .bar { width: 4px; align-self: stretch; border-radius: 4px; background: var(--tcolor); flex: 0 0 4px; }
  .tl-row .tlabel2 .av { width: 32px; height: 32px; border-radius: 9px; flex: 0 0 32px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; color: #fff; background: var(--tcolor); }
  .tl-row .tlabel2 .nm { font-size: 13.5px; font-weight: 700; }
  .tl-row .tlabel2 .meta { font-size: 11.5px; color: var(--muted); margin-top: 1px; }

  .lane { position: relative; height: 84px; }
  .lane .gridline { position: absolute; top: 0; bottom: 0; border-right: 1px solid var(--border-soft); }
  .gblock {
    position: absolute; top: 12px; bottom: 12px;
    background: var(--blockfill); border: 1px solid var(--blockborder); border-right: 3px solid var(--tcolor);
    border-radius: 8px; padding: 8px 10px; cursor: pointer; overflow: hidden;
    display: flex; flex-direction: column; gap: 4px;
    transition: transform .12s, box-shadow .15s;
  }
  .gblock:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(17,24,39,.1); z-index: 4; }
  .gblock .gtime { font-size: 11.5px; font-weight: 700; color: var(--tcolor); direction: ltr; font-feature-settings: "tnum"; }
  .gblock .gnames { font-size: 12px; color: var(--text-2); font-weight: 500; line-height: 1.35; overflow: hidden; }
  .gblock .gcnt { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--muted); }
  .lane-empty { position: absolute; inset: 0; display: flex; align-items: center; padding-right: 16px; font-size: 12px; color: #cbd2dd; }

  .legend { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; padding: 0 4px 18px; }
  .legend .item { display: flex; align-items: center; gap: 7px; font-size: 12.5px; color: var(--muted); font-weight: 500; }
  .legend .item .d { width: 8px; height: 8px; border-radius: 50%; }

  /* ── Detail drawer ───────────────────────── */
  .scrim { position: fixed; inset: 0; background: rgba(17,24,39,.28); opacity: 0; visibility: hidden; transition: opacity .2s; z-index: 40; }
  .scrim.show { opacity: 1; visibility: visible; }
  .drawer {
    position: fixed; top: 0; bottom: 0; left: 0; width: 380px; max-width: 90vw;
    background: var(--surface); border-right: 1px solid var(--border); z-index: 45;
    transform: translateX(-100%); transition: transform .26s cubic-bezier(.3,.8,.3,1);
    display: flex; flex-direction: column;
  }
  .drawer.show { transform: translateX(0); }
  .drawer-head { padding: 20px 22px 16px; border-bottom: 1px solid var(--border); }
  .drawer-head .top { display: flex; align-items: center; justify-content: space-between; }
  .drawer-head .tech-chip { display: flex; align-items: center; gap: 9px; }
  .drawer-head .tech-chip .av { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; color: #fff; }
  .drawer-head .tech-chip .nm { font-size: 14px; font-weight: 700; }
  .drawer-head .tech-chip .rg { font-size: 11.5px; color: var(--muted); }
  .drawer-head .close { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .15s, color .15s; }
  .drawer-head .close:hover { background: var(--page); color: var(--text); }
  .drawer-head .when { margin-top: 16px; display: flex; align-items: center; gap: 10px; }
  .drawer-head .when .cal { width: 40px; height: 40px; border-radius: 10px; background: var(--accent-fill); color: var(--accent-hover); display: flex; align-items: center; justify-content: center; flex: 0 0 40px; }
  .drawer-head .when .cal svg { width: 20px; height: 20px; }
  .drawer-head .when .txt .w { font-size: 16px; font-weight: 800; direction: ltr; text-align: right; font-feature-settings: "tnum"; }
  .drawer-head .when .txt .d { font-size: 12.5px; color: var(--muted); margin-top: 1px; }

  .drawer-body { flex: 1 1 auto; overflow: auto; padding: 16px 22px 22px; }
  .drawer-body .lbl { font-size: 11px; font-weight: 700; color: var(--faint); letter-spacing: .03em; margin-bottom: 12px; display: flex; align-items: center; gap: 7px; }
  .drawer-body .lbl .ct { margin-right: auto; color: var(--muted); }
  .stop-card { border: 1px solid var(--border); border-radius: var(--radius-card); padding: 14px; margin-bottom: 10px; }
  .stop-card .r1 { display: flex; align-items: center; gap: 9px; }
  .stop-card .idx { width: 22px; height: 22px; border-radius: 6px; background: var(--page); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--muted); flex: 0 0 22px; }
  .stop-card .nm { font-size: 14.5px; font-weight: 700; }
  .stop-card .stbadge { margin-right: auto; display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px; }
  .stbadge.pending { background: #FEF3C7; color: #92660B; }
  .stbadge.assigned { background: var(--accent-fill); color: var(--accent-hover); }
  .stbadge.done { background: #D1FAE5; color: #047857; }
  .stbadge .d { width: 6px; height: 6px; border-radius: 50%; }
  .stbadge.pending .d { background: var(--amber); }
  .stbadge.assigned .d { background: var(--accent); }
  .stbadge.done .d { background: var(--green); }
  .stop-card .r2 { display: flex; align-items: center; gap: 16px; margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); }
  .stop-card .r2 .it { display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--text-2); }
  .stop-card .r2 .it svg { width: 14px; height: 14px; color: var(--faint); }
  .stop-card .r2 .it.phone { direction: ltr; }

  @media (max-width: 1180px) {
    .topbar { grid-template-columns: 200px 1fr auto; }
    .sidebar { width: 76px; flex: 0 0 76px; }
    .sidebar .nav-item span, .nav-section, .nav-help .t { display: none; }
    .sidebar .nav-item { justify-content: center; padding: 0; }
    .nav-help { justify-content: center; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- Top bar -->
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark"></div>
      <div class="brand-name">משׂלוּל</div>
    </div>
    <div class="searchbar">

        <div>
          <div class="nm" id="dwTech"></div>
          <div class="rg" id="dwRegion"></div>

      <div class="cal"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></div>
      <div class="txt">
        <div class="w" id="dwWin"></div>
        <div class="d" id="dwDay"></div>
      </div>

    <div class="lbl">עצירות בחלון<span class="ct" id="dwCount"></span></div>
    <div id="dwStops"></div>
  </div>
</aside>

<script>
  const TECHS = {
    yossi: { name: 'יוסי בר־און', initials: 'י.ב', color: '#6366F1', region: 'תל אביב והסביבה' },
    dana:  { name: 'דנה כהן',    initials: 'ד.כ', color: '#7C3AED', region: 'ירושלים והשפלה' },
    omer:  { name: 'עומר לוי',   initials: 'ע.ל', color: '#0D9488', region: 'השרון והצפון' },
    ran:   { name: 'רן מזרחי',   initials: 'ר.מ', color: '#D97706', region: 'הדרום' },
  };
  const TORDER = ['yossi','dana','omer','ran'];

  const DAYS = [
    { dn: 'יום א׳', dd: '15.6', today: true },
    { dn: 'יום ב׳', dd: '16.6' },
    { dn: 'יום ג׳', dd: '17.6' },
    { dn: 'יום ד׳', dd: '18.6' },
    { dn: 'יום ה׳', dd: '19.6' },
  ];

  function block(s, e, jobs){ return { s, e, win: `${String(s).padStart(2,'0')}:00–${String(e).padStart(2,'0')}:00`, jobs }; }
  const J = (nm, ct, st, ph) => ({ nm, ct, st, ph });

  // week[tech][dayIndex] = array of blocks
  const WEEK = {
    yossi: [
      [ block(7,10,[ J('מעדניית רוזן','תל אביב','assigned','052-481-9930'), J('גן ירוק','רמת גן','assigned','054-220-7714') ]) ],
      [ block(11,14,[ J('סושי בר','הרצליה','assigned','053-771-4420'), J('סיטי מרקט','רעננה','assigned','052-660-1188'), J('חנות הספרים','כפר סבא','assigned','054-901-3322') ]) ],
      [ block(13,16,[ J('מטריקס מחשבים','מודיעין','pending','050-512-8890') ]) ],
      [],
      [ block(8,11,[ J('סמארט סנטר','תל אביב','assigned','052-330-7781') ]) ],
    ],
    dana: [
      [ block(10,13,[ J('מרכז הבריאות','חולון','done','054-118-2204'), J('עולם הילד','בת ים','done','052-740-9931') ]) ],
      [ block(9,12,[ J('מרפאת המרכז','ירושלים','assigned','050-228-6611'), J('מגה ג׳ים','מבשרת ציון','assigned','054-661-2090') ]) ],
      [ block(9,12,[ J('אופיס סנטר','ירושלים','assigned','052-908-4471'), J('סופר שופ','רמלה','assigned','053-440-1276') ]) ],
      [ block(14,17,[ J('היפר טוב','רמלה','assigned','054-330-8812'), J('טופ שוז','לוד','assigned','050-771-3398') ]) ],
      [],
    ],
    omer: [
      [ block(13,16,[ J('בילד-איט','גבעתיים','assigned','052-661-7740') ]) ],
      [ block(7,10,[ J('הום סטייל','נתניה','assigned','054-220-9931'), J('ספורט פלוס','חדרה','assigned','050-118-7763') ]) ],
      [ block(7,10,[ J('אלפא סנטר','נתניה','assigned','052-880-3344'), J('אופטיק ליין','חדרה','assigned','053-661-2200'), J('בית קפה הנמל','כפר יונה','assigned','054-771-0098') ]) ],
      [ block(7,10,[ J('טק פוינט','נתניה','assigned','050-330-9912'), J('מחשבים קלים','חדרה','assigned','052-118-4456') ]) ],
      [ block(8,11,[ J('קניון הכרמל','חיפה','pending','054-661-3321') ]) ],
    ],
    ran: [
      [],
      [ block(8,11,[ J('פוד סנטר','ראשון לציון','pending','052-441-9087'), J('ביג מרקט','נס ציונה','pending','054-330-1129') ]) ],
      [ block(8,11,[ J('קניון עירוני','אשדוד','pending','050-770-6634'), J('חנות הטכנולוגיה','אשקלון','pending','052-118-9923') ]) ],
      [ block(10,13,[ J('מרכז הדרום','כפר יונה','pending','054-220-1187') ]) ],
      [ block(11,14,[ J('אנרג׳י שופ','אשדוד','pending','050-661-7740'), J('בסט מובייל','אשקלון','pending','052-330-2218') ]) ],
    ],
  };

  const state = { view: 'week', day: 0, active: new Set(TORDER) };

  const STLABEL = { pending: 'ממתין', assigned: 'משובץ', done: 'הושלם' };

  /* ── Header stats ── */
  function refreshStats(){
    let total = 0, pending = 0;
    TORDER.forEach(t => WEEK[t].forEach(day => day.forEach(b => b.jobs.forEach(j => { total++; if (j.st === 'pending') pending++; }))));
    document.getElementById('totalJobs').textContent = total;
    document.getElementById('pendingJobs').textContent = pending;
  }

  /* ── Filter pills ── */
  function renderFilters(){
    const el = document.getElementById('filters');
    el.innerHTML = '';
    const allOn = state.active.size === TORDER.length;
    const all = document.createElement('button');
    all.className = 'pill all' + (allOn ? ' active' : '');
    all.innerHTML = '<span class="swatch"></span>כל הצוות';
    all.onclick = () => { state.active = new Set(TORDER); render(); };
    el.appendChild(all);
    TORDER.forEach(id => {
      const t = TECHS[id], on = state.active.has(id);
      const p = document.createElement('button');
      p.className = 'pill' + (on ? ' active' : ' dim');
      p.innerHTML = `<span class="av" style="background:${t.color}">${t.initials}</span>${t.name}`;
      p.onclick = () => {
        if (state.active.size === TORDER.length) state.active = new Set([id]);
        else if (state.active.has(id)) { state.active.delete(id); if (!state.active.size) state.active = new Set(TORDER); }
        else state.active.add(id);
        render();
      };
      el.appendChild(p);
    });
  }

  /* ── Day tabs (day view) ── */
  function renderDayTabs(){
    const el = document.getElementById('daytabs');
    el.className = 'daytabs' + (state.view === 'day' ? ' show' : '');
    el.innerHTML = '';
    DAYS.forEach((d, i) => {
      const b = document.createElement('button');
      b.className = 'daytab' + (i === state.day ? ' active' : '');
      b.innerHTML = `<span class="dn">${d.dn}</span><span class="dd">${d.dd}</span>`;
      b.onclick = () => { state.day = i; render(); };
      el.appendChild(b);
    });
  }

  function blockVars(t){
    return `--tcolor:${t.color}; --blockfill:color-mix(in srgb, ${t.color} 5%, #fff); --blockborder:color-mix(in srgb, ${t.color} 22%, #fff);`;
  }

  /* ── Week matrix ── */
  function renderWeek(){
    const m = document.getElementById('matrix');
    m.innerHTML = '';
    const corner = document.createElement('div');
    corner.className = 'corner';
    m.appendChild(corner);
    DAYS.forEach(d => {
      const h = document.createElement('div');
      h.className = 'dhead' + (d.today ? ' today' : '');
      h.innerHTML = `${d.today ? '<span class="pin"></span><br>' : ''}<span class="dn">${d.dn}</span><div class="dd">${d.dd}</div>`;
      m.appendChild(h);
    });

    TORDER.filter(id => state.active.has(id)).forEach(id => {
      const t = TECHS[id];
      const jobsCount = WEEK[id].reduce((a, day) => a + day.reduce((b2, blk) => b2 + blk.jobs.length, 0), 0);
      const label = document.createElement('div');
      label.className = 'tlabel';
      label.style.cssText = blockVars(t);
      label.innerHTML = `<span class="bar"></span><span class="av">${t.initials}</span>
        <div class="who"><div class="nm">${t.name}</div>
        <div class="meta"><span class="av-dot"></span>${jobsCount} קריאות · ${t.region.split(' ')[0]}</div></div>`;
      m.appendChild(label);

      WEEK[id].forEach((day, di) => {
        const cell = document.createElement('div');
        cell.className = 'cell' + (DAYS[di].today ? ' today-col' : '') + (day.length === 0 ? ' empty' : '');
        cell.style.cssText = blockVars(t);
        if (day.length === 0) {
          cell.innerHTML = `<span class="free"><span class="ln"></span>פנוי<span class="ln"></span></span>`;
        } else {
          day.forEach(blk => {
            const rows = blk.jobs.map(j => `<div class="jrow ${j.st}"><span class="st ${j.st}"></span><span class="nm">${j.nm}</span><span class="ct">${j.ct}</span></div>`).join('');
            const el = document.createElement('div');
            el.className = 'wblock';
            el.innerHTML = `<div class="wblock-head"><span class="win">${blk.win}</span><span class="cnt">${blk.jobs.length}</span></div><div class="wblock-rows">${rows}</div>`;
            el.onclick = () => openDrawer(id, di, blk);
            cell.appendChild(el);
          });
        }
        m.appendChild(cell);
      });
    });
  }

  /* ── Day timeline ── */
  const TL_START = 7, TL_END = 18, TL_SPAN = 11;
  function posR(h){ return ((h - TL_START) / TL_SPAN) * 100; }
  function widthH(s, e){ return ((e - s) / TL_SPAN) * 100; }

  function renderDay(){
    const dv = document.getElementById('dayview');
    dv.innerHTML = '';
    // axis header
    const head = document.createElement('div');
    head.className = 'tl-head';
    const c2 = document.createElement('div'); c2.className = 'corner2';
    const axis = document.createElement('div'); axis.className = 'tl-axis';
    for (let h = TL_START; h <= TL_END; h++) {
      const tick = document.createElement('div');
      tick.className = 'tl-tick';
      tick.style.right = posR(h) + '%';
      tick.innerHTML = `<span class="lbl">${String(h).padStart(2,'0')}:00</span>`;
      axis.appendChild(tick);
    }
    head.appendChild(c2); head.appendChild(axis);
    dv.appendChild(head);

    TORDER.filter(id => state.active.has(id)).forEach(id => {
      const t = TECHS[id];
      const blocks = WEEK[id][state.day];
      const row = document.createElement('div');
      row.className = 'tl-row';
      const dayCount = blocks.reduce((a, b2) => a + b2.jobs.length, 0);
      const label = document.createElement('div');
      label.className = 'tlabel2';
      label.style.cssText = blockVars(t);
      label.innerHTML = `<span class="bar"></span><span class="av">${t.initials}</span>
        <div><div class="nm">${t.name}</div><div class="meta">${dayCount ? dayCount + ' עצירות' : 'יום פנוי'}</div></div>`;
      row.appendChild(label);

      const lane = document.createElement('div');
      lane.className = 'lane';
      lane.style.cssText = blockVars(t);
      for (let h = TL_START + 1; h <= TL_END; h++) {
        const gl = document.createElement('div'); gl.className = 'gridline'; gl.style.right = posR(h) + '%'; lane.appendChild(gl);
      }
      if (!blocks.length) {
        const e = document.createElement('div'); e.className = 'lane-empty'; e.textContent = 'אין שיבוצים ביום זה'; lane.appendChild(e);
      } else {
        blocks.forEach(blk => {
          const names = blk.jobs.map(j => j.nm).join(' · ');
          const g = document.createElement('div');
          g.className = 'gblock';
          g.style.right = posR(blk.s) + '%';
          g.style.width = widthH(blk.s, blk.e) + '%';
          g.innerHTML = `<span class="gtime">${blk.win}</span><span class="gnames">${names}</span>`;
          g.onclick = () => openDrawer(id, state.day, blk);
          lane.appendChild(g);
        });
      }
      row.appendChild(lane);
      dv.appendChild(row);
    });
  }

  /* ── Drawer ── */
  function openDrawer(techId, dayIdx, blk){
    const t = TECHS[techId];
    document.getElementById('dwAv').textContent = t.initials;
    document.getElementById('dwAv').style.background = t.color;
    document.getElementById('dwTech').textContent = t.name;
    document.getElementById('dwRegion').textContent = 'אזור: ' + t.region;
    document.getElementById('dwWin').textContent = blk.win;
    document.getElementById('dwDay').textContent = DAYS[dayIdx].dn + ', ' + DAYS[dayIdx].dd + ' ביוני 2026';
    document.getElementById('dwCount').textContent = blk.jobs.length + ' עצירות';
    document.getElementById('dwStops').innerHTML = blk.jobs.map((j, i) => `
      <div class="stop-card">
        <div class="r1">
          <span class="idx">${i + 1}</span>
          <span class="nm">${j.nm}</span>
          <span class="stbadge ${j.st}"><span class="d"></span>${STLABEL[j.st]}</span>
        </div>
        <div class="r2">
          <span class="it"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>${j.ct}</span>
          <span class="it phone"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3.1-8.6A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.4 1.8.7 2.7a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.4-1.2a2 2 0 0 1 2.1-.5c.9.3 1.8.6 2.7.7a2 2 0 0 1 1.7 2Z"/></svg>${j.ph}</span>
        </div>
      </div>`).join('');
    document.getElementById('scrim').classList.add('show');
    document.getElementById('drawer').classList.add('show');
  }
  function closeDrawer(){
    document.getElementById('scrim').classList.remove('show');
    document.getElementById('drawer').classList.remove('show');
  }
  document.getElementById('scrim').onclick = closeDrawer;
  document.getElementById('dwClose').onclick = closeDrawer;
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

  /* ── View toggle ── */
  document.querySelectorAll('#viewSeg button').forEach(btn => {
    btn.onclick = () => {
      state.view = btn.dataset.view;
      document.querySelectorAll('#viewSeg button').forEach(b => b.classList.toggle('active', b === btn));
      render();
    };
  });

  function render(){
    refreshStats();
    renderFilters();
    renderDayTabs();
    const isWeek = state.view === 'week';
    document.getElementById('matrix').style.display = isWeek ? 'grid' : 'none';
    document.getElementById('dayview').className = 'dayview' + (isWeek ? '' : ' show');
    document.getElementById('rangeLabel').textContent = isWeek ? '15–19 ביוני 2026' : (DAYS[state.day].dn + ', ' + DAYS[state.day].dd + ' ביוני 2026');
    if (isWeek) renderWeek(); else renderDay();
  }

  render();
</script>
</body>
</html>
