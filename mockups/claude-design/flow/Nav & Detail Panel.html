<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>לוח בקרה — Maslul</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --accent: #6366F1;
    --accent-hover: #4F46E5;
    --accent-fill: #EEF2FF;
    --accent-border: #C7D2FE;
    --page: #F7F7F8;
    --surface: #FFFFFF;
    --border: #E4E4E7;
    --border-soft: #F0F0F2;
    --text: #111827;
    --text-2: #374151;
    --muted: #6B7280;
    --faint: #9CA3AF;
    --green: #10B981;
    --amber: #F59E0B;
    --red: #EF4444;
    --radius-btn: 6px;
    --radius-card: 10px;
    --radius-panel: 14px;
    --nav: 220px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: 'Heebo', sans-serif; background: var(--page); color: var(--text); -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  button { font-family: inherit; }

  /* ── Right nav ───────────────────────────── */
  .nav {
    position: fixed; top: 0; right: 0; bottom: 0; width: var(--nav);
    background: var(--page); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; padding: 18px 14px 14px; z-index: 10;
  }
  .nav .brand { display: flex; align-items: center; gap: 10px; padding: 4px 8px 18px; }
  .nav .brand-mark { width: 30px; height: 30px; border-radius: 9px; background: var(--accent); position: relative; flex: 0 0 30px; }
  .nav .brand-mark::after { content: ""; position: absolute; inset: 9.5px; border-radius: 50%; border: 2.5px solid #fff; border-bottom-color: transparent; transform: rotate(45deg); }
  .nav .brand-name { font-size: 19px; font-weight: 800; letter-spacing: -0.01em; }

  .nav-section { font-size: 11px; font-weight: 700; color: var(--faint); letter-spacing: .08em; padding: 6px 12px 8px; }

  .nav-item {
    position: relative; display: flex; align-items: center; gap: 11px;
    height: 42px; padding: 0 12px; border-radius: 9px; margin-bottom: 2px;
    font-size: 14px; font-weight: 500; color: var(--text-2); text-decoration: none; cursor: pointer;
    transition: background .15s, color .15s;
  }
  .nav-item svg { width: 19px; height: 19px; color: var(--faint); transition: color .15s; }
  .nav-item:hover { background: #efeff1; color: var(--text); }
  .nav-item.active { background: var(--accent-fill); color: var(--accent-hover); font-weight: 700; }
  .nav-item.active svg { color: var(--accent); }
  .nav-item.active::before { content: ""; position: absolute; right: -14px; top: 50%; transform: translateY(-50%); width: 3px; height: 20px; border-radius: 0 3px 3px 0; background: var(--accent); }

  .nav-spacer { flex: 1 1 auto; }
  .tenant {
    display: flex; align-items: center; gap: 10px; padding: 10px 11px; border-radius: 11px;
    background: var(--surface); border: 1px solid var(--border); margin-bottom: 10px;
  }
  .tenant .logo { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg,#6366F1,#7C3AED); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; flex: 0 0 32px; }
  .tenant .t .co { font-size: 13px; font-weight: 700; }
  .tenant .t .role { font-size: 11.5px; color: var(--muted); margin-top: 1px; }
  .user { display: flex; align-items: center; gap: 10px; padding: 4px 11px; }
  .user .av { width: 30px; height: 30px; border-radius: 50%; background: var(--accent-fill); color: var(--accent-hover); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex: 0 0 30px; }
  .user .nm { font-size: 13px; font-weight: 600; }
  .user .out { margin-right: auto; color: var(--faint); display: flex; cursor: pointer; }
  .user .out svg { width: 16px; height: 16px; }

  /* ── Main ────────────────────────────────── */
  .main { margin-right: var(--nav); min-height: 100vh; padding: 36px 40px; }
  .main-head { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 24px; }
  .main-head h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; }
  .main-head .sub { font-size: 13.5px; color: var(--muted); margin-top: 5px; }
  .seg { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: 9px; padding: 3px; gap: 2px; }
  .seg button { height: 32px; padding: 0 14px; border: none; background: none; border-radius: 6px; font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; transition: background .15s, color .15s, box-shadow .15s; }
  .seg button.active { background: var(--accent-fill); color: var(--accent-hover); }

  .jobs { max-width: 760px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-panel); overflow: hidden; box-shadow: 0 1px 2px rgba(17,24,39,.03); }
  .jrow { display: flex; align-items: center; gap: 16px; padding: 16px 20px; cursor: pointer; transition: background .12s; }
  .jrow + .jrow { border-top: 1px solid var(--border-soft); }
  .jrow:hover { background: #fafafb; }
  .jrow.sel { background: var(--accent-fill); }
  .jrow .st { width: 9px; height: 9px; border-radius: 50%; flex: 0 0 9px; }
  .jrow .st.assigned { background: var(--accent); }
  .jrow .st.done { background: var(--green); }
  .jrow .st.pending { background: var(--amber); }
  .jrow .st.cancelled { background: var(--red); }
  .jrow .nm { font-size: 15px; font-weight: 700; min-width: 168px; }
  .jrow .loc { font-size: 13.5px; color: var(--muted); min-width: 130px; }
  .jrow .win { font-size: 13px; font-weight: 600; color: var(--text-2); font-feature-settings: "tnum"; direction: ltr; min-width: 100px; }
  .jrow .tech { display: flex; align-items: center; gap: 7px; margin-right: auto; }
  .jrow .tech .av { width: 24px; height: 24px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 9.5px; font-weight: 800; color: #fff; }
  .jrow .tech .tn { font-size: 13px; color: var(--text-2); font-weight: 500; }
  .jrow .chev { color: var(--faint); display: flex; }
  .jrow .chev svg { width: 16px; height: 16px; }

  /* ── Detail slide-in ─────────────────────── */
  .scrim { position: fixed; inset: 0; background: rgba(17,24,39,.16); opacity: 0; visibility: hidden; transition: opacity .2s; z-index: 30; }
  .scrim.show { opacity: 1; visibility: visible; }
  .detail {
    position: fixed; top: 0; bottom: 0; left: 0; width: 420px; max-width: 92vw;
    background: var(--surface); border-right: 1px solid var(--border); z-index: 35;
    transform: translateX(-100%); transition: transform .28s cubic-bezier(.32,.72,.3,1);
    display: flex; flex-direction: column;
    box-shadow: 22px 0 50px -28px rgba(17,24,39,.35);
  }
  .detail.show { transform: translateX(0); }

  .detail-head { padding: 24px 26px 20px; border-bottom: 1px solid var(--border); }
  .detail-head .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .detail-head .eyebrow { font-size: 11.5px; font-weight: 600; color: var(--faint); letter-spacing: .04em; }
  .detail-head .close { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .15s, color .15s; }
  .detail-head .close:hover { background: var(--page); color: var(--text); }
  .detail-head .client { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .detail-head .client .nm { font-size: 22px; font-weight: 800; letter-spacing: -0.01em; }
  .status-pill { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; padding: 5px 11px; border-radius: 999px; white-space: nowrap; }
  .status-pill .d { width: 7px; height: 7px; border-radius: 50%; }
  .status-pill.assigned { background: var(--accent-fill); color: var(--accent-hover); }
  .status-pill.assigned .d { background: var(--accent); }
  .status-pill.done { background: #D1FAE5; color: #047857; }
  .status-pill.done .d { background: var(--green); }
  .status-pill.pending { background: #FEF3C7; color: #92660B; }
  .status-pill.pending .d { background: var(--amber); }
  .status-pill.cancelled { background: #FEE2E2; color: #B91C1C; }
  .status-pill.cancelled .d { background: var(--red); }

  .detail-body { flex: 1 1 auto; overflow: auto; padding: 8px 26px 26px; }
  .drow { display: flex; align-items: flex-start; gap: 16px; padding: 16px 0; border-bottom: 1px solid var(--border-soft); }
  .drow:last-child { border-bottom: none; }
  .drow .label { flex: 0 0 92px; font-size: 13px; color: var(--faint); font-weight: 500; padding-top: 2px; }
  .drow .val { flex: 1 1 auto; min-width: 0; font-size: 14.5px; color: var(--text); font-weight: 500; line-height: 1.5; }
  .drow .val .sub { display: block; font-size: 13px; color: var(--muted); font-weight: 400; margin-top: 3px; }
  .drow .val.win { direction: ltr; text-align: right; font-feature-settings: "tnum"; font-weight: 600; }
  .drow .val .tech-line { display: flex; align-items: center; gap: 9px; }
  .drow .val .tech-line .av { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 10.5px; font-weight: 800; color: #fff; flex: 0 0 30px; }
  .drow .val .tech-line .tn { font-size: 14.5px; font-weight: 600; }
  .drow .val .tech-line .rg { font-size: 12.5px; color: var(--muted); }
  .svc-chip { display: inline-flex; align-items: center; font-size: 13px; font-weight: 600; color: var(--accent-hover); background: var(--accent-fill); border: 1px solid var(--accent-border); border-radius: 7px; padding: 4px 11px; }
  .drow .val.notes { font-size: 14px; color: var(--text-2); font-weight: 400; }

  .detail-foot { padding: 16px 26px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .btn { height: 40px; border-radius: var(--radius-btn); font-size: 13.5px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; transition: background .15s, border-color .15s, color .15s; }
  .btn svg { width: 16px; height: 16px; }
  .btn.primary { flex: 1 1 auto; background: var(--accent); color: #fff; border: 1px solid var(--accent); }
  .btn.primary:hover { background: var(--accent-hover); }
  .btn.icon { width: 40px; flex: 0 0 40px; background: var(--surface); border: 1px solid var(--border); color: var(--text-2); }
  .btn.icon:hover { border-color: var(--accent-border); background: var(--accent-fill); color: var(--accent-hover); }
  .btn.icon.locked { background: var(--accent-fill); border-color: var(--accent-border); color: var(--accent-hover); }
  .btn.danger { background: var(--surface); border: 1px solid var(--border); color: var(--red); padding: 0 14px; }
  .btn.danger:hover { background: #FEF2F2; border-color: #FECACA; }
</style>
</head>
<body>

  <!-- Right nav -->
  <aside class="nav">
    <div class="brand">
      <div class="brand-mark"></div>
      <div class="brand-name">משׂלוּל</div>
    </div>
    <div class="nav-section">ניווט</div>
    <a class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>לוח בקרה</a>
    <a class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18M12 14v4M10 16h4"/></svg>שיבוץ</a>
    <a class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v4M16 2v4M3 8h18M5 4h14a2 2 0 0 1 2 2v13a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Z"/></svg>יומן</a>
    <a class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.9"/></svg>טכנאים</a>
    <a class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3 3 6v15l6-3 6 3 6-3V3l-6 3-6-3Z"/><path d="M9 3v15M15 6v15"/></svg>אזורים</a>
    <a class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 15l4-4 3 3 5-6"/></svg>דוחות</a>
    <div class="nav-spacer"></div>
    <div class="tenant">
      <div class="logo">ש+</div>
      <div class="t">
        <div class="co">שירות פלוס בע״מ</div>
        <div class="role">מנהלת תפעול</div>
      </div>
    </div>
    <div class="user">
      <div class="av">נ</div>
      <div class="nm">נעמה לוי</div>
      <span class="out"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg></span>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="main-head">
      <div>
        <h1>קריאות היום</h1>
        <div class="sub">יום א׳, 15 ביוני 2026 · 6 קריאות פעילות</div>
      </div>
      <div class="seg">
        <button class="active">הכל</button>
        <button>ממתינות</button>
        <button>הושלמו</button>
      </div>
    </div>
    <div class="jobs" id="jobs"></div>
  </main>

  <!-- Scrim + detail -->
  <div class="scrim" id="scrim"></div>
  <aside class="detail" id="detail">
    <div class="detail-head">
      <div class="top">
        <span class="eyebrow">קריאה #<span id="dId"></span></span>
        <button class="close" id="dClose"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
      </div>
      <div class="client">
        <span class="nm" id="dClient"></span>
        <span class="status-pill" id="dStatus"></span>
      </div>
    </div>
    <div class="detail-body">
      <div class="drow">
        <span class="label">מיקום</span>
        <span class="val" id="dLoc"></span>
      </div>
      <div class="drow">
        <span class="label">חלון הגעה</span>
        <span class="val win" id="dWin"></span>
      </div>
      <div class="drow">
        <span class="label">טכנאי</span>
        <span class="val"><span class="tech-line" id="dTech"></span></span>
      </div>
      <div class="drow">
        <span class="label">סוג שירות</span>
        <span class="val"><span class="svc-chip" id="dSvc"></span></span>
      </div>
      <div class="drow">
        <span class="label">הערות</span>
        <span class="val notes" id="dNotes"></span>
      </div>
    </div>
    <div class="detail-foot">
      <button class="btn primary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>עריכה</button>
      <button class="btn icon" id="lockBtn" title="נעילת שיבוץ"><svg id="lockIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg></button>
      <button class="btn danger"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>ביטול</button>
    </div>
  </aside>

<script>
  const TECHS = {
    yossi: { name:'יוסי בר־און', initials:'י.ב', color:'#6366F1', region:'תל אביב והסביבה' },
    dana:  { name:'דנה כהן',    initials:'ד.כ', color:'#7C3AED', region:'ירושלים והשפלה' },
    omer:  { name:'עומר לוי',   initials:'ע.ל', color:'#0D9488', region:'השרון והצפון' },
    ran:   { name:'רן מזרחי',   initials:'ר.מ', color:'#D97706', region:'הדרום' },
  };
  const STLABEL = { assigned:'משובץ', done:'הושלם', pending:'ממתין', cancelled:'בוטל' };

  const JOBS = [
    { id:'4821', client:'מעדניית רוזן', city:'תל אביב', addr:'דיזנגוף 120, דירה 5', win:'07:00–10:00', day:'יום א׳, 15 ביוני', tech:'yossi', svc:'התקנה', st:'assigned', notes:'קוד כניסה 1234. הלקוח ביקש להתקשר חצי שעה לפני ההגעה.' },
    { id:'4822', client:'גן ירוק', city:'רמת גן', addr:'ביאליק 8', win:'07:00–10:00', day:'יום א׳, 15 ביוני', tech:'yossi', svc:'אחזקה תקופתית', st:'done', notes:'הטיפול הושלם. נדרש ביקור חוזר בעוד 3 חודשים.' },
    { id:'4823', client:'מרפאת המרכז', city:'ירושלים', addr:'יפו 200, קומה 3', win:'09:00–12:00', day:'יום א׳, 15 ביוני', tech:'dana', svc:'תיקון', st:'assigned', notes:'חניה זמינה בחזית הבניין. לתאם עם המזכירה בכניסה.' },
    { id:'4824', client:'פוד סנטר', city:'ראשון לציון', addr:'הרצל 90', win:'08:00–11:00', day:'יום א׳, 15 ביוני', tech:'ran', svc:'בדיקה / אבחון', st:'pending', notes:'ממתין לאישור הלקוח על עלות החלפת רכיב.' },
    { id:'4825', client:'קניון הכרמל', city:'חיפה', addr:'מורדי הגטאות 8', win:'08:00–11:00', day:'יום א׳, 15 ביוני', tech:'omer', svc:'התקנה', st:'assigned', notes:'גישה דרך רחבת הפריקה האחורית בלבד.' },
    { id:'4826', client:'בית קפה הנמל', city:'כפר יונה', addr:'השרון 9', win:'12:00–15:00', day:'יום א׳, 15 ביוני', tech:'omer', svc:'תיקון', st:'assigned', notes:'העסק פעיל — לתאם שעה שקטה מול המנהל.' },
  ];

  function renderList(){
    const el = document.getElementById('jobs');
    el.innerHTML = '';
    JOBS.forEach(j=>{
      const t = TECHS[j.tech];
      const row = document.createElement('div');
      row.className = 'jrow';
      row.dataset.id = j.id;
      row.innerHTML = `
        <span class="st ${j.st}"></span>
        <span class="nm">${j.client}</span>
        <span class="loc">${j.city}</span>
        <span class="win">${j.win}</span>
        <span class="tech"><span class="av" style="background:${t.color}">${t.initials}</span><span class="tn">${t.name.split(' ')[0]}</span></span>
        <span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></span>`;
      row.onclick = ()=> openDetail(j.id);
      el.appendChild(row);
    });
  }

  let locked = false;
  function openDetail(id){
    const j = JOBS.find(x=> x.id===id); if(!j) return;
    const t = TECHS[j.tech];
    document.querySelectorAll('.jrow').forEach(r=> r.classList.toggle('sel', r.dataset.id===id));
    document.getElementById('dId').textContent = j.id;
    document.getElementById('dClient').textContent = j.client;
    const sp = document.getElementById('dStatus');
    sp.className = 'status-pill ' + j.st;
    sp.innerHTML = `<span class="d"></span>${STLABEL[j.st]}`;
    document.getElementById('dLoc').innerHTML = `${j.city}<span class="sub">${j.addr}</span>`;
    document.getElementById('dWin').innerHTML = `${j.win}<span class="sub" style="direction:rtl">${j.day}</span>`;
    document.getElementById('dTech').innerHTML = `<span class="av" style="background:${t.color}">${t.initials}</span><span><span class="tn">${t.name}</span> <span class="rg">· ${t.region}</span></span>`;
    document.getElementById('dSvc').textContent = j.svc;
    document.getElementById('dNotes').textContent = j.notes;
    document.getElementById('scrim').classList.add('show');
    document.getElementById('detail').classList.add('show');
  }
  function closeDetail(){
    document.getElementById('scrim').classList.remove('show');
    document.getElementById('detail').classList.remove('show');
    document.querySelectorAll('.jrow').forEach(r=> r.classList.remove('sel'));
  }
  document.getElementById('scrim').onclick = closeDetail;
  document.getElementById('dClose').onclick = closeDetail;
  document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeDetail(); });

  document.getElementById('lockBtn').onclick = ()=>{
    locked = !locked;
    const b = document.getElementById('lockBtn');
    b.classList.toggle('locked', locked);
    b.title = locked ? 'שיבוץ נעול' : 'נעילת שיבוץ';
    document.getElementById('lockIcon').innerHTML = locked
      ? '<rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/>'
      : '<rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 7.5-1.5"/>';
  };

  renderList();
  // open first by default to showcase the panel
  openDetail('4821');
</script>
</body>
</html>
